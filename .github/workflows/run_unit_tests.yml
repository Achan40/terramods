name: Run unit tests

on:
  push:
    branches:
      - dev
    paths:
      - 'modules/**'
      - 'examples/**'
      - 'test/**'
  pull_request:
    branches:
      - dev
    paths:
      - 'modules/**'
      - 'examples/**'
      - 'test/**'

jobs:
  static-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('test/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Verify Go modules are tidy
        run: |
          cd test/
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Go vet
        run: cd test && go vet ./...

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.5

      - name: Terraform format check
        run: terraform fmt -check -recursive modules/

      - name: Terraform validate
        run: |
          for dir in modules/*/; do
            echo "Validating $dir"
            terraform -chdir="$dir" init -backend=false -input=false
            terraform -chdir="$dir" validate
          done

  run-unit-tests:
    needs: static-checks
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 90
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: us-east-2
          role-to-assume: ${{ secrets.CI_CD_ROLE_ARN }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('test/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.5

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '1.0.0'
          tofu_version: '1.11.5'

      - name: Clear terragrunt cache
        run: find . -type d -name ".terragrunt-cache" -exec rm -rf {} +

      - name: Run Terratest
        env:
          TERRAGRUNT_LOG_LEVEL: error
          TF_LOG: ERROR
        run: |
          cd test/
          go mod tidy
          go test -short ./units/... -timeout 60m

  promote-to-uat:
    needs: run-unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge dev into UAT
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git switch uat
          git merge origin/dev --no-ff -m "Promote dev to UAT"
          git push origin uat
